<!DOCTYPE html>
<html>
<head>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Prevents scrollbars if the image fits perfectly */
        }

        .full-page-image {
            width: 100vw;    /* 100% of the viewport width */
            height: 100vh;   /* 100% of the viewport height */
            object-fit: contain; /* Keeps the aspect ratio so it doesn't get squished */
            background-color: #fff7e7; /* this is the extra space */
        }
    </style>
</head>
<body>

    <img src="https://codehs.com/uploads/314a9e0f4cc5073e715433ff84f13f8d" class="full-page-image" alt="Matirials">
