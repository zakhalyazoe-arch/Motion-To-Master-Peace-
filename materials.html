<!DOCTYPE html>
<html>
<head>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Prevents scrollbars if the image fits perfectly */
        }

        .full-page-image {
            width: 100vw;    /* 100% of the viewport width */
            height: 100vh;   /* 100% of the viewport height */
            object-fit: contain; /* Keeps the aspect ratio so it doesn't get squished */
            background-color: #fff7e7; /* this is the extra space */
        }
    </style>
</head>
<body>

    <img src="https://codehs.com/uploads/314a9e0f4cc5073e715433ff84f13f8d" class="full-page-image" alt="Matirials">

</body>
</html>
<style>
    body {
        margin: 0;
        display: flex;
        /* This keeps your content centered */
        justify-content: center; 
        /* This fills the whole screen so no black space shows */
        background-color: #000; 
        height: 100vh;
    }

    .side-panel {
        width: 200px; /* Adjust this to change how wide the images are */
        height: 100vh;
        background-size: cover;
        background-position: center;
    }

    /* Put your images here */
    .left-image { background-image: url('YOUR_LEFT_IMAGE_URL'); }
    .right-image { background-image: url('YOUR_RIGHT_IMAGE_URL'); }

    .main-content {
        max-width: 800px;
        background: white;
        overflow-y: auto;
    }
</style>

<body>
    <div class="side-panel left-image"></div>
    <div class="main-content">
        </div>
    <div class="side-panel right-image"></div>
</body>
